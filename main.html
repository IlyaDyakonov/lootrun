<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bonus Wheel</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="page">
        <div class="brand">
            <img src="picture/logo.png" width="104" height="24" alt="Logo" />
        </div>

        <header class="header">
            <div class="descr-header">
                <div class="wheelFooter">
                    <div class="pill-limited">LIMITED OFFER</div>
                    <div class="hero-header-fine">
                        <span class="hero-header-fine-one hero-header-brand" data-i18n="hero_brand"></span>
                        <span class="hero-header-fine-two hero-header-prefix" data-i18n="hero_prefix"></span>
                        <span class="hero-header-fine-two hero-header-spin-for" data-i18n="hero_spin_for"></span>
                        <span class="hero-header-fine-one" data-i18n="hero_free_spins"></span>
                    </div>
                </div>
            </div>
        </header>

        <section class="wheel">
            <div class="hero-header-description-fine">
                <span class="hero-header-description-fine-grey" data-i18n="hero_spin"></span>
                <span class="hero-header-description-fine-white" data-i18n="hero_free"></span>
                <span class="hero-header-description-fine-grey" data-i18n="hero_for_sweet"></span>
                <span class="hero-header-description-fine-white" data-i18n="hero_500"></span>
                <span class="hero-header-description-fine-grey" data-i18n="hero_first"></span>
                <span class="hero-header-description-fine-white" data-i18n="hero_loot"></span>
            </div>
            <div class="case">

                <div class="btn-spin">
                    <button class="wheel-spin" type="button" aria-label="Spin"></button>
                </div>

                <img class="wheel-arrow" src="picture/arrow.png" alt="arrow" />

                <img class="wheel-border" src="picture/border-wheel.png" alt="border-wheel" />

                <div class="sectors" id="sectors"></div>

            </div>
            <div class="wheel-text">
                <div class="wheel-text-one" data-i18n="footer_no_deposit_needed"></div>
                <div class="wheel-text-two" data-i18n="footer_bonus_activation_text"></div>
            </div>

            <img class="case" src="picture/case.png" alt="arrow" />
        </section>

        <main class="layout">
            <aside class="counter">
                <div class="spins">
                    <div class="spins-label" data-i18n="stats_spins_today_label"></div>
                    <div class="spins-value" id="spinsToday">2 473</div>
                </div>
                <div class="bonuses">
                    <div class="bonuses-label" data-i18n="stats_bonuses_claimed_label"></div>
                    <div class="bonuses-value" id="bonusesClaimed">1 092</div>
                </div>
            </aside>

            <aside class="banners">
                <div class="frame-31">
                    <!-- <div class="frame-31-promo"> -->
                    <div class="miniTag" data-i18n="promo_special_promo"></div>
                    <!-- </div> -->

                    <div class="frame-31-fs-fd">
                        <div class="frame-32">
                            <div class="frame-34">
                                <img src="picture/berry.png" width="32px" height="32px" alt="Frame 34" />
                                <!-- <div class="frame-34-text"> -->
                                <div class="frame-34-text" data-i18n="promo_free_spins"></div>
                                <!-- </div> -->
                            </div>
                            <div class="frame-34-text-value">
                                <div class="frame-34-text-value-sub" data-i18n="promo_for_game"></div>
                            </div>
                        </div>
                        <img src="picture/trick.png" alt="" class="trick">
                        <img src="picture/sweet_bananza.png" alt="" class="sweet-bananza">
                        <img src="picture/fs.png" alt="" class="fs">
                    </div>

                    <div class="frame-31-fs-fd">
                        <div class="frame-32">
                            <div class="frame-34">
                                <img src="picture/gift.png" width="32px" height="32px" alt="Frame 34" />
                                <!-- <div class="frame-34-text"> -->
                                <div class="frame-34-text" data-i18n="promo_up_to_bonus"></div>
                                <!-- </div> -->
                            </div>
                            <div class="frame-34-text-value">
                                <div class="frame-34-text-value-sub" data-i18n="promo_first_deposit"></div>
                            </div>
                        </div>
                        <img src="picture/dollar-top.png" alt="" class="dollar-top">
                        <img src="picture/dollar-bottom.png" alt="" class="dollar-bottom">
                        <img src="picture/bag.png" alt="" class="bag">
                    </div>
                </div>
            </aside>



            <section class="card-icons">

            </section>

            <section class="girl">

            </section>


        </main>

        <footer class="footer">
            <div class="images-footer">
                <div class="lang">
                    <button
                        id="langToggle"
                        class="langToggle"
                        type="button"
                        aria-label="Language"
                        aria-haspopup="listbox"
                        aria-expanded="false"
                    >
                        <span class="langToggleLabel">EN</span>
                        <span class="langChevron" aria-hidden="true"></span>
                    </button>
                    <div id="langMenu" class="langMenu" role="listbox" aria-label="Language options" hidden>
                        <button class="langOption" type="button" role="option" data-lang-option="en" aria-selected="true">EN</button>
                        <button class="langOption" type="button" role="option" data-lang-option="uz" aria-selected="false">UZ</button>
                        <button class="langOption" type="button" role="option" data-lang-option="ru" aria-selected="false">RU</button>
                    </div>
                </div>
                <span class="frame-66">
                    <span class="frame-66-age">18+</span>
                    <span class="frame-66-year">© 2026</span>
                </span>
            </div>
        </footer>
    </div>

    <script src="languages.inline.js"></script>
    <script src="app.js" defer></script>
</body>

</html>
