<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bonus Wheel</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="page">
        <div class="brand">
            <img src="picture/logo.png" width="104" height="24" alt="Logo" />
        </div>

        <div class="page-bg-layer" aria-hidden="true">
            <!-- Добавляй сюда фоновые картинки. Они не участвуют в потоке и не двигают верстку. -->
            <img src="picture/header.png" alt="" class="page-bg-image" style="top: 0; left: 0; width: 393px; height: auto;" />
            <img src="picture/Ellipse24-center.png" alt="" class="page-bg-image" style="top: 70px; left: 0; width: 393px; height: auto;" />
            <img src="picture/lights.png" alt="" class="page-bg-image" style="top: 580px; left: 0; width: 393px; height: auto;" />
            <img src="picture/footer-light.png" alt="" class="page-bg-image" style="top: 1490px; left: 0; width: 393px; height: auto;" />
            <img src="picture/footer-light1.png" alt="" class="page-bg-image" style="top: 1410px; left: 0; width: 393px; height: auto;" />
        </div>

        <header class="header">
            <div class="descr-header">
                <div class="wheelFooter">
                    <div class="pill-limited">LIMITED OFFER</div>
                    <div class="hero-header-fine">
                        <span class="hero-header-fine-one hero-header-brand" data-i18n="hero_brand"></span>
                        <span class="hero-header-fine-two hero-header-prefix" data-i18n="hero_prefix"></span>
                        <span class="hero-header-fine-two hero-header-spin-for" data-i18n="hero_spin_for"></span>
                        <span class="hero-header-fine-one" data-i18n="hero_free_spins"></span>
                    </div>
                </div>
            </div>
        </header>

        <section class="wheel">
            <div class="hero-header-description-fine">
                <span class="hero-header-description-fine-grey" data-i18n="hero_spin"></span>
                <span class="hero-header-description-fine-white" data-i18n="hero_free"></span>
                <span class="hero-header-description-fine-grey" data-i18n="hero_for_sweet"></span>
                <span class="hero-header-description-fine-white" data-i18n="hero_500"></span>
                <span class="hero-header-description-fine-grey" data-i18n="hero_first"></span>
                <span class="hero-header-description-fine-white" data-i18n="hero_loot"></span>
            </div>
            <div class="hero-header-description-fine hero-header-description-fine-spinning" hidden>
                <span class="hero-header-description-fine-grey" data-i18n="spin_state_line_1"></span>
                <span class="hero-header-description-fine-white" data-i18n="spin_state_line_2"></span>
                <span class="hero-header-description-fine-grey" data-i18n="spin_state_line_3"></span>
                <span class="hero-header-description-fine-white" data-i18n="spin_state_line_4"></span>
            </div>

            <div class="wheel-decor" aria-hidden="true">
                <img src="picture/hearts.png" alt="" class="wheel-decor-img wheel-decor-hearts" />
                <img src="picture/diamonds.png" alt="" class="wheel-decor-img wheel-decor-diamonds" />
                <img src="picture/spades.png" alt="" class="wheel-decor-img wheel-decor-spades" />
                <img src="picture/clubs.png" alt="" class="wheel-decor-img wheel-decor-clubs" />
                <img src="picture/fiska.png" alt="" class="wheel-decor-img wheel-decor-fiska" />
                <img src="picture/casino.png" alt="" class="wheel-decor-img wheel-decor-casino" />
            </div>

            <div class="case">

                <div class="btn-spin">
                    <button class="wheel-spin" type="button" aria-label="Spin"></button>
                </div>

                <img class="wheel-arrow" src="picture/arrow.png" alt="arrow" />

                <img class="wheel-border" src="picture/border-wheel.png" alt="border-wheel" />

                <div class="sectors" id="sectors"></div>

            </div>
            <div class="wheel-text">
                <div class="wheel-text-one" data-i18n="footer_no_deposit_needed"></div>
                <div class="wheel-text-two" data-i18n="footer_bonus_activation_text"></div>
            </div>

            <img class="case" src="picture/case.png" alt="case" />

            <div class="spinning-bonus-container">
                <img class="spinning-bonus-one" src="picture/spinning.png" alt="spinning-bonus" />
                <img class="spinning-bonus-two" src="picture/spinning (1).png" alt="spinning-bonus" />
            </div>

            <div class="wheel-fireworks" id="wheelFireworks" hidden aria-hidden="true">
                <img class="wheel-firework wheel-firework--1" src="picture/fireworks.gif" alt="" decoding="async" />
                <img class="wheel-firework wheel-firework--2" src="picture/fireworks.gif" alt="" decoding="async" />
                <img class="wheel-firework wheel-firework--3" src="picture/fireworks.gif" alt="" decoding="async" />
            </div>

        </section>

        <main class="layout">
            <aside class="counter">
                <div class="spins">
                    <div class="spins-label" data-i18n="stats_spins_today_label"></div>
                    <div class="spins-value" id="spinsToday">2 473</div>
                    <img src="picture/Ellipse-spins.png" alt="Ellipse-spins" class="ellipse-spins-image" />
                </div>
                <div class="bonuses">
                    <div class="bonuses-label" data-i18n="stats_bonuses_claimed_label"></div>
                    <div class="bonuses-value" id="bonusesClaimed">1 092</div>
                    <img src="picture/Ellipse-bonus.png" alt="Ellipse-bonus" class="ellipse-bonus-image" />
                </div>
            </aside>

            <aside class="banners">
                <div class="frame-31">
                    <!-- <div class="frame-31-promo"> -->
                    <div class="miniTag">
                        <img src="picture/Ellipse-miniTag.png" alt="tag" class="tag-image" />
                        <img src="picture/Ellipse-miniTag1.png" alt="tag" class="tag-image1" />
                        <span class="miniTag-text" data-i18n="promo_special_promo"></span>
                    </div>
                    <!-- </div> -->

                    <div class="frame-31-fs-fd">
                        <div class="frame-32">
                            <div class="frame-34">
                                <img src="picture/berry.png" width="32px" height="32px" alt="Frame 34" />
                                <!-- <div class="frame-34-text"> -->
                                <div class="frame-34-text" data-i18n="promo_free_spins"></div>
                                <!-- </div> -->
                            </div>
                            <div class="frame-34-text-value">
                                <div class="frame-34-text-value-sub" data-i18n="promo_for_game"></div>
                            </div>
                        </div>
                        <img src="picture/trick.png" alt="" class="trick">
                        <img src="picture/sweet_bananza.png" alt="" class="sweet-bananza">
                        <img src="picture/fs.png" alt="" class="fs">
                        <img src="picture/Ellipse24-fs.png" alt="" class="ellipse-24-fs-image">
                        <img src="picture/Ellipse25-fs.png" alt="" class="ellipse-25-fs-image">
                    </div>

                    <div class="frame-31-fs-fd">
                        <div class="frame-32">
                            <div class="frame-34">
                                <img src="picture/gift.png" width="32px" height="32px" alt="Frame 34" />
                                <!-- <div class="frame-34-text"> -->
                                <div class="frame-34-text" data-i18n="promo_up_to_bonus"></div>
                                <!-- </div> -->
                            </div>
                            <div class="frame-34-text-value">
                                <div class="frame-34-text-value-sub" data-i18n="promo_first_deposit"></div>
                            </div>
                        </div>
                        <img src="picture/dollar-top.png" alt="" class="dollar-top">
                        <img src="picture/dollar-bottom.png" alt="" class="dollar-bottom">
                        <img src="picture/bag.png" alt="" class="bag">
                        <img src="picture/Ellipse24-fd.png" alt="" class="ellipse-24-fd-image">
                        <img src="picture/Ellipse25-fd.png" alt="" class="ellipse-25-fd-image">
                    </div>
                </div>
            </aside>



            <section class="card-icons">

            </section>

            <section class="girl">

            </section>


        </main>

        <footer class="footer">
            <div class="images-footer">
                <div class="lang">
                    <button id="langToggle" class="langToggle" type="button" aria-label="Language"
                        aria-haspopup="listbox" aria-expanded="false">
                        <span class="langToggleLabel">EN</span>
                        <span class="langChevron" aria-hidden="true"></span>
                    </button>
                    <div id="langMenu" class="langMenu" role="listbox" aria-label="Language options" hidden>
                        <button class="langOption" type="button" role="option" data-lang-option="en"
                            aria-selected="true">EN</button>
                        <button class="langOption" type="button" role="option" data-lang-option="uz"
                            aria-selected="false">UZ</button>
                        <button class="langOption" type="button" role="option" data-lang-option="ru"
                            aria-selected="false">RU</button>
                    </div>
                </div>
                <span class="frame-66">
                    <span class="frame-66-age">18+</span>
                    <span class="frame-66-year">© 2026</span>
                </span>
            </div>
        </footer>

        <div id="wheelResultPopup" class="wheel-result-popup" hidden aria-hidden="true" aria-modal="true" role="dialog">
            <div class="wheel-result-popup__box wheel-result-popup__box-bonus">
                <div class="wheel-result-popup__box-title">
                    <span class="wheel-result-popup__box-title-text" data-i18n="unlock_youve_unlocked"></span>
                    <span class="wheel-result-popup__box-title-text" data-i18n="unlock_a_sweet_bonus"></span>
                </div>
                <div class="wheel-result-popup__box-content">
                    <div class="wheel-result-popup__box-content-text-one" data-i18n="unlock_up_to"></div>
                    <div class="wheel-result-popup__box-content-text-two" data-i18n="unlock_percent"></div>
                    <div class="wheel-result-popup__box-content-text-three" data-i18n="unlock_on_first"></div>
                    <div class="wheel-result-popup__box-content-text-four" data-i18n="unlock_deposit_at"></div>
                </div>
                <div class="wheel-result-popup__box-button">
                    <div class="wheel-result-popup__box-button-claim">
                        <button class="wheel-result-popup__box-button-claim-bonus"
                            data-i18n="claim_bonus_button"></button>
                        <button type="button" class="wheel-result-popup__box-button-try-again"
                            data-i18n="try_again_button"></button>
                    </div>
                    <div class="wheel-result-popup__box-button-message-text"
                        data-i18n="bonus_activated_after_registration_and_first_deposit">
                    </div>
                </div>
                <img class="wheel-result-popup-ellipse24" src="picture/Ellipse24.png" alt="" aria-hidden="true" />
                <img class="wheel-result-popup-ellipse25" src="picture/Ellipse25.png" alt="" aria-hidden="true" />
            </div>

            <div class="wheel-result-popup__box wheel-result-popup__box-steps" hidden aria-hidden="true">
                <img src="picture/sweet_bananza.png" alt="" class="sweet-bananza-popup">
                <div class="wheel-result-popup__box-steps-content">
                    <div class="wheel-result-popup__box-steps-content-title">
                        <span class="wheel-result-popup__box-steps-content-title-text" data-i18n="almost_done"></span>
                    </div>
                    <div class="wheel-result-popup__box-steps-content-text">
                        <span class="wheel-result-popup__box-steps-content-text-text" data-i18n="steps_intro"></span>
                    </div>
                </div>

                <div class="wheel-result-popup__box-steps-claim">
                    <button class="wheel-result-popup__box-steps-continue-to" data-i18n="continue_to"></button>
                </div>

                <img class="wheel-result-popup__box-steps-ellipse24" src="picture/Ellipse24.png" alt=""
                    aria-hidden="true" />
                <img class="wheel-result-popup__box-steps-ellipse25" src="picture/Ellipse25.png" alt=""
                    aria-hidden="true" />

                <div class="wheel-result-popup__box-steps-three-steps">
                    <div class="wheel-result-popup__box-steps-three-steps-item">
                        <img class="wheel-result-popup__box-steps-bluecoin" src="picture\bluecoin.png" alt="bluecoin1">
                        <span class="wheel-result-popup__box-steps-three-steps-item-text" data-i18n="step1_title"></span>
                        <span class="wheel-result-popup__box-steps-three-steps-item-text-text" data-i18n="step1_text"></span>
                    </div>
                    <div class="wheel-result-popup__box-steps-three-steps-item">
                        <img class="wheel-result-popup__box-steps-bluecoin" src="picture\bluecoin2.png" alt="bluecoin2">
                        <span class="wheel-result-popup__box-steps-three-steps-item-text" data-i18n="step2_title"></span>
                        <span class="wheel-result-popup__box-steps-three-steps-item-text-text" data-i18n="step2_text"></span>
                    </div>
                    <div class="wheel-result-popup__box-steps-three-steps-item">
                        <img class="wheel-result-popup__box-steps-bluecoin" src="picture\bluecoin3.png" alt="bluecoin3">
                        <span class="wheel-result-popup__box-steps-three-steps-item-text" data-i18n="step3_title"></span>
                        <span class="wheel-result-popup__box-steps-three-steps-item-text-text" data-i18n="step3_text"></span>
                    </div>
                </div>

                <div class="wheel-result-popup__box-button-message-text">
                    <span class="wheel-result-popup__box-button-message-text-text" data-i18n="redirect_message"></span>
                    <span class="wheel-result-popup__box-button-message-text-text" data-i18n="offer_new_players_only"></span>
                </div>
            </div>

        </div>
    </div>

    <script src="languages.inline.js"></script>
    <script src="app.js" defer></script>
</body>

</html>
